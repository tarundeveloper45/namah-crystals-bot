<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Namah Crystals World — AI Crystal Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(circle at 20% 10%, #2a1b4a 0%, #150d2e 40%, #0b0719 100%);
    font-family: 'Outfit', system-ui, sans-serif;
    display: flex; align-items: flex-end; justify-content: flex-end;
    padding: 24px; overflow: hidden; position: relative;
  }
  .stars { position: absolute; inset: 0; opacity: 0.5; pointer-events: none; }
  .stars span { position: absolute; border-radius: 50%; background: #e9d8a6; box-shadow: 0 0 6px #e9d8a6; }
  .window {
    width: 100%; max-width: 400px; height: 620px; max-height: 90vh;
    background: rgba(17,11,38,0.92); backdrop-filter: blur(14px);
    border: 1px solid rgba(233,216,166,0.25); border-radius: 24px;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55); position: relative; z-index: 10;
  }
  .brand {
    text-align: center; padding: 12px 16px 8px;
    font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600;
    letter-spacing: 4px; color: #e9d8a6; text-transform: uppercase;
    background: linear-gradient(180deg, rgba(109,74,255,0.28), transparent);
    border-bottom: 1px solid rgba(233,216,166,0.1);
    text-shadow: 0 0 14px rgba(233,216,166,0.4);
  }
  .header { padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(233,216,166,0.15);
    background: linear-gradient(180deg, rgba(109,74,255,0.22), transparent); }
  .avatar { width: 44px; height: 44px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #b79bff, #4a2fb0);
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    box-shadow: 0 0 18px rgba(183,155,255,0.6); flex-shrink: 0; }
  .htitle { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600;
    color: #f3e9c9; line-height: 1.1; }
  .hsub { font-size: 11.5px; color: #9b86d8; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #6ee7a0; box-shadow: 0 0 6px #6ee7a0; }
  .messages { flex: 1; overflow-y: auto; padding: 18px 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 11px 15px; font-size: 14.5px; line-height: 1.5; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; border-radius: 16px 16px 4px 16px;
    color: #150d2e; background: linear-gradient(135deg, #e9d8a6, #d4bd7a); }
  .msg.bot { align-self: flex-start; border-radius: 16px 16px 16px 4px;
    color: #ece6f7; background: rgba(109,74,255,0.16); border: 1px solid rgba(183,155,255,0.22); }
  .msg.bot a { color: #e9d8a6; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
  .chip { background: rgba(233,216,166,0.1); border: 1px solid rgba(233,216,166,0.3);
    border-radius: 20px; padding: 7px 12px; font-size: 12.5px; color: #e9d8a6;
    cursor: pointer; font-family: 'Outfit', sans-serif; }
  .chip:hover { background: rgba(233,216,166,0.2); }
  .typing { align-self: flex-start; padding: 13px 16px; border-radius: 16px 16px 16px 4px;
    background: rgba(109,74,255,0.16); border: 1px solid rgba(183,155,255,0.22); display: flex; gap: 5px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #b79bff; animation: pulse 1.2s infinite ease-in-out; }
  .typing span:nth-child(2){ animation-delay: .2s; } .typing span:nth-child(3){ animation-delay: .4s; }
  @keyframes pulse { 0%,100%{ opacity:.3; transform:translateY(0);} 50%{ opacity:1; transform:translateY(-3px);} }
  .inputbar { padding: 14px 16px; border-top: 1px solid rgba(233,216,166,0.15); display: flex; gap: 9px; align-items: center; }
  .inputbar input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(183,155,255,0.25);
    border-radius: 14px; padding: 11px 14px; color: #f3e9c9; font-size: 14px; outline: none; font-family: 'Outfit', sans-serif; }
  .send { width: 44px; height: 44px; border-radius: 14px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #e9d8a6, #d4bd7a); color: #150d2e; font-size: 18px; flex-shrink: 0; }
  .send:disabled { background: rgba(183,155,255,0.25); cursor: default; }
  .footer { text-align: center; font-size: 10px; color: #6b5a9e; padding-bottom: 8px; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: rgba(183,155,255,0.3); border-radius: 3px; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="window">
  <div class="brand">✦ Namah Crystals World ✦</div>
  <div class="header">
    <div class="avatar">✦</div>
    <div style="flex:1">
      <div class="htitle">Namah Crystals · Crystal Guide</div>
      <div class="hsub"><span class="dot"></span> Your crystal guide · online</div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="inputbar">
    <input id="input" placeholder="Ask about a crystal…" autocomplete="off" />
    <button class="send" id="send">➤</button>
  </div>
  <div class="footer">✦ Powered by Namah Crystals AI ✦</div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  CONFIG — set this to your backend URL once deployed (see README).
//  While empty, the bot runs in built-in DEMO MODE (no API key needed).
// ════════════════════════════════════════════════════════════════
const BACKEND_URL = "https://namah-crystals-bot.vercel.app/api/chat"; // e.g. "https://namah-bot.vercel.app/api/chat"

const WELCOME = "Namaste 🙏 Welcome to Namah Crystals World. Tell me your date of birth and I'll find your perfect Mulank bracelet — or ask me about any crystal you're drawn to. ✨";

const QUICK_PROMPTS = [
  "Find my bracelet by date of birth 🎂",
  "Tell me about Blue Lapis Lazuli 💙",
  "I want abundance — show me Citrine ☀️",
  "How do I cleanse my bracelet?",
  "What's included with my order? 🎁"
];

// ── Mulank data (used by demo mode) ──
const MULANK = {
  1: ["Golden Rutile Bracelet","manifestation, energy & prosperity","https://namahcrystals.com/products/golden-rutile"],
  2: ["Selenite Bracelet","calm, cleansing & mental clarity","https://namahcrystals.com/products/selenite"],
  3: ["Citrine Bracelet","abundance, joy & confidence","https://namahcrystals.com/products/citrine"],
  4: ["Tiger Eye Bracelet","grounding, courage & protection","https://namahcrystals.com/products/tiger-eye"],
  5: ["Labradorite Bracelet","transformation, intuition & protection","https://namahcrystals.com/products/labradorite-female"],
  6: ["Black Rutilated Quartz Bracelet","protection from negativity","https://namahcrystals.com/products/black-rutilated"],
  7: ["Green Cat's Eye Bracelet","luck & protection","https://namahcrystals.com/products/green-cat-s-eye"],
  8: ["Lapis Lazuli Bracelet","wisdom, truth & abundance","https://namahcrystals.com/products/lapis-lazuli"],
  9: ["Carnelian Bracelet","energy, passion & motivation","https://namahcrystals.com/products/carnelian"]
};

const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendEl = document.getElementById("send");
let history = [];
let firstTurn = true;

// starfield
const starsEl = document.getElementById("stars");
for (let i = 0; i < 40; i++) {
  const s = document.createElement("span");
  const big = i % 5 === 0;
  s.style.top = ((i*37)%100)+"%"; s.style.left = ((i*53)%100)+"%";
  s.style.width = s.style.height = (big?3:1.5)+"px";
  s.style.opacity = 0.4 + ((i*7)%6)/12;
  starsEl.appendChild(s);
}

function addMessage(role, text) {
  const d = document.createElement("div");
  d.className = "msg " + (role === "user" ? "user" : "bot");
  d.innerHTML = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
  messagesEl.appendChild(d);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addChips() {
  const wrap = document.createElement("div");
  wrap.className = "chips";
  QUICK_PROMPTS.forEach(q => {
    const b = document.createElement("button");
    b.className = "chip"; b.textContent = q;
    b.onclick = () => { wrap.remove(); send(q); };
    wrap.appendChild(b);
  });
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const t = document.createElement("div");
  t.className = "typing"; t.id = "typing";
  t.innerHTML = "<span></span><span></span><span></span>";
  messagesEl.appendChild(t);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }

// ── DEMO MODE: simple offline answers so the page works without a backend ──
function demoReply(msg) {
  const m = msg.toLowerCase();
  // try to find a date / day number
  const dateMatch = msg.match(/\b(\d{1,2})\b/);
  if (m.includes("birth") || m.includes("dob") || m.includes("mulank") || (dateMatch && (m.includes("born")||m.includes("/")||m.includes("-")))) {
    if (dateMatch) {
      let day = parseInt(dateMatch[1], 10);
      if (day >= 1 && day <= 31) {
        let n = day; while (n > 9) { n = String(n).split("").reduce((a,b)=>a+parseInt(b),0); }
        const [name, benefit, link] = MULANK[n];
        return `Your Mulank is ${n} ✨\nYour perfect bracelet is the ${name} — ${benefit}.\nView it here: ${link}\n\n(For full accuracy you can also use our finder: https://namahcrystals.com/pages/check-your-bracelets)`;
      }
    }
    return "I'd love to find your Mulank bracelet 🙏 Please tell me your date of birth (for example: 23-11-1990).";
  }
  if (m.includes("lapis")) return "Blue Lapis Lazuli (₹8,100) — deep blue with whispers of gold, a symbol of wisdom, intuition and abundance. Affirmation: \"I am wise and wealthy.\" View: https://namahcrystals.com/products/lapis-lazuli";
  if (m.includes("citrine")) return "Citrine (₹8,100) — the merchant's stone of abundance, joy and manifestation. Affirmation: \"I attract abundance and radiate positivity.\" View: https://namahcrystals.com/products/citrine";
  if (m.includes("black") || m.includes("rutilated") || m.includes("protect")) return "Black Rutilated Quartz (₹8,100) — protection and grounding, shielding you from negativity. Affirmation: \"I am protected, clear, and resilient.\" View: https://namahcrystals.com/products/black-rutilated";
  if (m.includes("cleanse") || m.includes("clean") || m.includes("included") || m.includes("gift") || m.includes("box")) return "Every order includes a free Selenite cleansing plate and a Labradorite Ganesha idol in a luxury box 🎁 Each night, rest your bracelet on the Selenite plate to cleanse the day's negativity.";
  if (m.includes("size")) return "Our standard size is 6.5–8 inches. For a custom size, email support@namahcrystals.com after ordering.";
  if (m.includes("ship")) return "We ship worldwide in multiple currencies 🌍";
  return "I can help you find the perfect crystal ✨ Tell me your date of birth for a Mulank recommendation, or ask about a specific crystal like Citrine, Lapis Lazuli, or Black Rutilated Quartz. For anything else, reach us at support@namahcrystals.com.";
}

async function send(text) {
  const content = (text ?? inputEl.value).trim();
  if (!content) return;
  if (firstTurn) { const c = document.querySelector(".chips"); if (c) c.remove(); firstTurn = false; }
  addMessage("user", content);
  inputEl.value = "";
  history.push({ role: "user", content });
  showTyping();

  // If no backend is configured, use demo mode
  if (!BACKEND_URL) {
    setTimeout(() => {
      hideTyping();
      const reply = demoReply(content);
      addMessage("bot", reply);
      history.push({ role: "assistant", content: reply });
    }, 600);
    return;
  }

  // Real AI mode (requires your deployed backend)
  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.reply || "I'm having trouble right now — please email support@namahcrystals.com.";
    addMessage("bot", reply);
    history.push({ role: "assistant", content: reply });
  } catch (e) {
    hideTyping();
    addMessage("bot", "My connection to the cosmos wavered ✨ Please try again, or email support@namahcrystals.com.");
  }
}

sendEl.onclick = () => send();
inputEl.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); send(); } });

// init
addMessage("bot", WELCOME);
addChips();
</script>
</body>
</html>
